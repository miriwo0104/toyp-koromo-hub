<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トイプーころものおでかけ日記</title>
  <meta name="description" content="トイプードルのころもと一緒におでかけ♪ YouTube・TikTok・Instagramで発信中！">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RHJBLSEVLV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RHJBLSEVLV');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #ffe0ec 0%, #fde8f5 40%, #e8d8f8 100%);
      padding: 24px 16px;
    }

    /* 背景の装飾 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,182,193,0.35) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(216,191,255,0.35) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1.5px solid rgba(255,255,255,0.85);
      box-shadow:
        0 8px 32px rgba(220,160,200,0.18),
        0 2px 8px rgba(200,150,220,0.10);
      padding: 40px 28px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    /* アイコン画像 */
    .avatar-wrap {
      margin: 0 auto 20px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 18px rgba(220,150,180,0.30);
      overflow: hidden;
      background: #fde8f5;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* タイトル */
    .title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #c06090;
      letter-spacing: 0.04em;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #b07898;
      letter-spacing: 0.06em;
      margin-bottom: 28px;
    }

    /* リンクボタン */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 15px 20px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    /* YouTube */
    .btn-youtube {
      background: linear-gradient(135deg, #ff7a7a 0%, #ff4a4a 100%);
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,80,80,0.30);
    }

    /* TikTok */
    .btn-tiktok {
      background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
      color: #fff;
      box-shadow: 0 4px 18px rgba(30,30,30,0.22);
    }

    /* Instagram */
    .btn-instagram {
      background: linear-gradient(135deg, #f97bb0 0%, #c86dd4 50%, #8b6ef0 100%);
      color: #fff;
      box-shadow: 0 4px 18px rgba(200,100,200,0.30);
    }

    .btn-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* フッター */
    .footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: #c0a0b8;
    }
  </style>
</head>
<body>

    <p class="footer">© 2025 トイプーころものおでかけ日記</p>
  </div>
</body>
</html>
