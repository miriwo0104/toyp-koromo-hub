<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トイプーころものおでかけ日記</title>
  <meta name="description" content="トイプードルのころもと一緒におでかけ。YouTube・TikTok・Instagramで発信中。">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RHJBLSEVLV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RHJBLSEVLV');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.08);
      padding: 44px 32px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    /* アイコン画像 */
    .avatar-wrap {
      margin: 0 auto 22px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      background: #f0f0f0;
      border: 2px solid #e8e8e8;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* タイトル */
    .title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111111;
      letter-spacing: 0.04em;
      line-height: 1.55;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      color: #888888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* 区切り線 */
    .divider {
      width: 32px;
      height: 1px;
      background: #dddddd;
      margin: 0 auto 32px;
    }

    /* リンクボタン */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 14px 20px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* YouTube */
    .btn-youtube {
      background: #111111;
      color: #ffffff;
    }

    .btn-youtube:hover {
      background: #333333;
    }

    /* TikTok */
    .btn-tiktok {
      background: #ffffff;
      color: #111111;
      border-color: #dddddd;
    }

    .btn-tiktok:hover {
      background: #f5f5f5;
      border-color: #bbbbbb;
    }

    /* Instagram */
    .btn-instagram {
      background: #ffffff;
      color: #111111;
      border-color: #dddddd;
    }

    .btn-instagram:hover {
      background: #f5f5f5;
      border-color: #bbbbbb;
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* フッター */
    .footer {
      margin-top: 32px;
      font-size: 0.70rem;
      font-weight: 300;
      color: #bbbbbb;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- ★ アイキャッチ画像: src を差し替えてください -->

      <img
        src="./koromo.jpg"
        alt="ころも"
        onerror="this.style.display='none'"
      >
    </div>

    <h1 class="title">トイプーころものおでかけ日記</h1>
    <p class="subtitle">Koromo's Outing Diary</p>

    </div>

    <p class="footer">© 2025 トイプーころものおでかけ日記</p>
  </div>
</body>
</html>
